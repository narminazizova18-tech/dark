<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dark Sky</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="text-white">
    <div class="sky-bg"></div>
    <svg class="weather-scene" viewBox="0 0 1440 400" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
        <circle cx="200" cy="80" r="55" fill="rgba(251,191,36,0.25)"/>
        <circle cx="200" cy="80" r="38" fill="rgba(251,191,36,0.35)"/>
        <g opacity="0.18">
            <ellipse cx="280" cy="160" rx="110" ry="48" fill="white"/>
            <ellipse cx="220" cy="170" rx="70" ry="40" fill="white"/>
            <ellipse cx="340" cy="168" rx="80" ry="38" fill="white"/>
            <ellipse cx="280" cy="180" rx="110" ry="30" fill="white"/>
        </g>
        <g opacity="0.14">
            <ellipse cx="1100" cy="100" rx="130" ry="50" fill="white"/>
            <ellipse cx="1030" cy="112" rx="80" ry="42" fill="white"/>
            <ellipse cx="1170" cy="110" rx="90" ry="40" fill="white"/>
            <ellipse cx="1100" cy="122" rx="130" ry="30" fill="white"/>
        </g>
        <g opacity="0.1">
            <ellipse cx="720" cy="60" rx="90" ry="35" fill="white"/>
            <ellipse cx="670" cy="70" rx="55" ry="30" fill="white"/>
            <ellipse cx="770" cy="68" rx="60" ry="28" fill="white"/>
        </g>
        <ellipse cx="300" cy="420" rx="420" ry="180" fill="rgba(15,40,70,0.45)"/>
        <ellipse cx="900" cy="440" rx="500" ry="160" fill="rgba(10,30,55,0.5)"/>
        <ellipse cx="1300" cy="430" rx="350" ry="170" fill="rgba(12,35,62,0.45)"/>
        <rect x="0" y="360" width="1440" height="40" fill="rgba(8,25,48,0.6)"/>
        <g opacity="0.12" stroke="white" stroke-width="1.5" stroke-linecap="round">
            <line x1="950" y1="130" x2="940" y2="195"/>
            <line x1="975" y1="125" x2="965" y2="190"/>
            <line x1="1000" y1="132" x2="990" y2="197"/>
            <line x1="1025" y1="128" x2="1015" y2="193"/>
            <line x1="1050" y1="135" x2="1040" y2="200"/>
            <line x1="1075" y1="130" x2="1065" y2="195"/>
        </g>
    </svg>

    <div class="sky-shell">
        <div class="container">

            <div class="app-header">
                <p class="app-name">My Dark Sky</p>
                <h1 class="app-tagline">Weather, any place, any day.</h1>
            </div>

            <div class="search-card">
                <div class="search-row">
                    <div class="search-input-wrap">
                        <input type="text" id="citySearch" class="form-control" placeholder="Search for a city...">
                        <div id="searchResults" class="list-group"></div>
                    </div>
                    <button class="location-btn" type="button" onclick="detectLocation()">📍 Use my location</button>
                </div>
            </div>

            <div id="weatherDisplay" class="d-none">

                <div class="toolbar-panel">
                    <div>
                        <p class="date-label">Pick a date</p>
                        <input type="date" id="datePicker" class="date-control">
                    </div>
                    <button id="viewWeatherBtn" class="action-btn" type="button">Show weather</button>
                </div>

                <div class="weather-stage">

                    <div class="current-panel">
                        <p id="selectedDateLabel" class="date-mode">Today</p>
                        <h2 id="locationName">---</h2>
                        <div id="mainTemp" style="font-size:4.5rem;font-weight:300;line-height:1;margin-bottom:0.25rem;">0°</div>
                        <p id="weatherDesc" style="color:rgba(255,255,255,0.7);margin-bottom:1.5rem;text-transform:capitalize;"></p>
                        <div class="detail-grid">
                            <div class="weather-card">
                                <span class="detail-label">Humidity</span>
                                <span id="humidity" class="detail-value">—</span>
                            </div>
                            <div class="weather-card">
                                <span class="detail-label">Wind</span>
                                <span id="wind" class="detail-value">—</span>
                            </div>
                            <div class="weather-card">
                                <span class="detail-label">High</span>
                                <span id="highTemp" class="detail-value">—</span>
                            </div>
                            <div class="weather-card">
                                <span class="detail-label">Low</span>
                                <span id="lowTemp" class="detail-value">—</span>
                            </div>
                        </div>
                    </div>

                    <!-- Forecast -->
                    <div class="forecast-panel">
                        <p class="forecast-heading">7-day outlook</p>
                        <h3 class="forecast-title">Upcoming forecast</h3>
                        <div id="forecastGrid"></div>
                    </div>

                </div>
            </div>

        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
